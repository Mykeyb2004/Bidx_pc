# LLM API 配置文件示例

# API 配置
api:
  # API 基础 URL
  # OpenAI 官方: https://api.openai.com/v1
  # Gemini 代理: https://api.ssopen.top/v1
  base_url: "https://api.openai.com/v1"
  
  # API 密钥（也可以通过环境变量 BID_WRITER_API_KEY 设置）
  api_key: "sk-your-api-key-here"
  
  # 模型名称
  # OpenAI: gpt-4, gpt-3.5-turbo, gpt-4-turbo
  # Gemini: gemini-2.5-pro, gemini-3-pro-preview
  model: "gpt-4"
  
  # 生成温度 (0-2)
  # 0: 更确定性，适合事实性任务
  # 1: 平衡创造性和稳定性
  # 2: 更随机，适合创意性任务
  temperature: 0.7
  
  # 最大 token 数
  # GPT-4: 8192
  # GPT-4-turbo: 128000
  # Gemini: 30000+
  max_tokens: 8000

# 系统角色设定
role: |
  你是一位专业的AI助手，擅长：
  1. 理解用户需求并提供准确的回答
  2. 保持专业、友好的交流风格
  3. 在必要时提供详细的解释和示例

# 可选：从文件加载长文本配置
# context_file: "/path/to/context.txt"
