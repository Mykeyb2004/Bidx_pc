# 自动标书撰写系统配置文件

role: | # system prompt 中的角色设定，多行文本会直接进入模型的 system 消息
  你现在扮演“公共文化服务满意度测评领域投标文本专家”，专门服务于杭州菲尔德咨询参与政府采购项目文本编制。

  一、角色要求
   你熟悉公共文化服务现代化建设、基本公共文化服务标准化均等化、公共文化设施体系建设、数字文化服务、群众文化需求表达、满意度测评、第三方评估和政府采购文本写作，了解宣传文化和文旅系统政策语境、评审逻辑、验收要求及基层公共文化服务实际场景。

  二、任务要求
   围绕公共文化服务满意度测评类项目，准确拆解采购需求，编写或优化项目理解、需求分析、实施方案、技术路线、指标体系构建、调查组织、质量控制、风险防控、进度计划、成果交付和验收支撑等内容。

  三、能力要求
   能够准确识别采购目标、评分重点、关键交付物和实质性条款；能够将政策要求转化为测评逻辑和实施路径；能够围绕服务供给、设施布局、空间使用、数字建设、运行管理、治理保障和群众感知构建指标体系；具备省域范围、多层级调查项目的统筹实施能力，能够围绕样本设计、执行调度、现场管理、质量控制和成果归集等关键环节建立规范统一、衔接顺畅的工作体系，确保调查过程可控、标准一致、结果真实可靠；能够综合运用文案研究、深度访谈、结构化问卷、电话调查和统计分析等方法形成完整技术链条；能够建立覆盖组织管理、过程督导、数据复核、档案归集和验收衔接的项目管理体系。

  四、写作原则
   始终围绕招标文件和采购需求写作，不偏题、不漏项；始终在公共文化服务现代化建设和高质量发展框架下表达，不偏离政策口径；始终把指标体系构建、调查组织实施、质量控制、数据分析和成果输出作为主线；始终体现“前期研究—指标设计—调查实施—质量复核—数据分析—成果形成—验收交付”的完整闭环；始终做到可执行、可督导、可检查、可追溯、可核验、可验收。

  五、语言要求
   使用机关化、研究型、政府采购风格表达，要求政策性强、逻辑严密、结构清楚、措辞稳妥。优先使用“围绕”“聚焦”“立足”“依托”“构建”“细化”“强化”“形成”“推动”“确保”等表述。严禁使用宣传式、营销式、口号式语言，严禁出现“行业领先”“全面赋能”“高质量高标准完成”等空泛表述。

generation: # 生成阶段的通用参数
  default_min_words: 1500 # 默认章节最低字数
  min_words_min: 100 # 界面或调用侧允许设置的最低字数下限
  min_words_max: 12000 # 界面或调用侧允许设置的最低字数上限
  min_words_step: 100 # 字数调节步长
  stream: true # 是否以流式方式接收模型输出
  stream_idle_timeout_seconds: 12 # 流式输出在最后一个 token 后的静默收尾超时秒数

prompt: # 提示词拼接相关配置
  output_format: "纯正文" # 写入章节任务卡的“输出方式”文案
  first_line_template: "" # 首行模板；为空则不追加“首行要求”区块
  allow_markdown_headings: false # 是否允许模型输出 Markdown 标题符号（#）
  allow_english_terms: false # 是否允许输出必要英文术语
  bidder_name: "杭州菲尔德咨询" # 投标主体统一名称
  max_tables_per_section: 2 # 每个章节允许插入的 Markdown 表格上限
  summary_title: "" # 章节总结标题名；当前主要用于生成后检测而非提示词拼接
  hard_constraints: # system prompt 中追加的高优先级强约束列表
    - "章节结构如需分层展开，必须使用正式层级序号，第一层级到第四层级分别为：一、（一）1. （1）。"
    - "如果层级序号后面带标题文字，则该行只写“序号 + 标题”，下一行另起正文。"
    - "正文中的段内枚举或并列说明，不视为章节层级，可使用“第一……、第二……”或“一是……；二是……；三是……”。"
    - "正文中不得使用“首先、其次、再次、最后”组织内容。"
    - "严禁使用Markdown标题符号（#）。"
    - "严禁正文中出现类似“作为xx投标专家”之类的内容。严禁在正文中输出评论性、意图解释性的内容。"
    - "禁止输出AI腔调，如“在当今数字化转型的大背景下...”“我们将秉承...的理念”等套话。"
    - "禁止过度使用排比句、空洞的形容词、夸张的词语。"
    - "禁止段落结构千篇一律，不要机械套用总-分-总。"
    - "禁止中英文混杂、不必要的专业术语堆砌、不必要的术语英文解释。"
    - "禁止输出分割线。"
  extra_rules: # user prompt 末尾追加的“其他写作要求”列表
    - "内容要专业、严谨，符合标书撰写规范，满足对评分标准高响应、高得分的要求"

context_pruning: # 章节级上下文裁剪配置，用于从大纲/采购需求/评分标准中提炼当前章节上下文
  enabled: true # 是否启用章节级裁剪；关闭后直接把完整需求与评分标准放入 user prompt
  debug_dump: true # 是否输出裁剪调试文件到 output/_context_pruning_debug
  mode: "legacy_rule" # 章节裁剪主模式：legacy_rule=现有规则模式，hybrid_extract=新检索摘录模式
  unavailable_policy: "fallback_legacy" # 新模式不可用时的处理策略：fallback_legacy=回退旧模式，fail_fast=直接报错
  local_outline: # 局部大纲裁剪配置
    include_ancestors: true # 局部大纲中是否保留当前章节的祖先标题链
    include_siblings: true # 局部大纲中是否保留当前章节的同级标题
    max_siblings: 8 # 局部大纲最多保留多少个同级标题
  scoring: # 评分标准路由配置
    enabled: true # 是否从评分标准中筛选与当前章节最相关的评分项
    mode: "legacy_rule" # 评分标准提炼模式；首轮保持 legacy_rule，后续可切到 hybrid_extract
    parse_mode: "auto" # 评分标准解析模式：auto=自动识别表格/文字，table_only=只解析表格，text_only=只解析文字
    max_rows: 4 # 最多保留多少条命中评分项进入 user prompt
  requirements: # 采购需求检索摘录配置
    mode: "legacy_rule" # 采购需求提炼模式；首轮保持 legacy_rule，后续可切到 hybrid_extract
    max_quotes: 4 # 最多保留多少条采购需求原文摘录
    max_quote_chars: 220 # 单条采购需求原文摘录最大字符数
  requirements_brief: # 采购需求原文摘录配置
    enabled: true # 是否生成 requirement_brief；开启后优先把原文摘录作为“需求要点”发给模型
    fallback: "rule_only" # 需求摘录失败时的回退策略配置项；当前主链路未实际使用
  retrieval: # hybrid_extract 检索配置；当前支持 lexical、vector 以及可选 rerank/verify
    lexical_enabled: true # 是否启用 lexical retrieval；hybrid_extract v1 要求为 true
    vector_enabled: false # 是否启用向量召回；开启时需在 .env.local 配置 BID_WRITER_EMBEDDING_*
    rerank_enabled: false # 是否启用候选重排；与 llm_verify_enabled 一起决定是否进入候选精排/校验链路
    top_k_lexical: 20 # lexical retrieval 保留的候选数
    top_k_vector: 20 # 向量召回候选数；仅在 vector_enabled=true 时生效
    top_k_fused: 30 # lexical/vector 融合排序后的候选数
    top_k_final: 6 # 最终进入摘录阶段的候选数
    min_fused_score: 0.0 # 最终候选最低得分；小于该值的候选会被过滤
    embedding: # embedding 业务参数；连接敏感信息放在 .env.local
      model: "text-embedding-3-small" # 向量模型名称；vector_enabled=true 时实际调用
      batch_size: 64 # 批量生成 embedding 的批大小
      cache_dir: "./output/_embedding_cache" # embedding 本地缓存目录
      rebuild_on_source_change: true # 源文变化时是否重建 embedding 缓存
      query_prefix: "" # 查询文本 embedding 前缀；默认留空
      document_prefix: "" # 文档文本 embedding 前缀；默认留空
  extraction: # 检索摘录阶段输出控制
    quote_only: true # 是否只允许原文摘录，不允许摘要改写
    return_ids_only: true # 若后续启用模型重排，仅返回片段 ID，再由程序回填原文
    llm_verify_enabled: false # 是否启用辅助模型对候选做校验；开启时只返回 unit_id，不直接输出摘录文本
    llm_verify_max_candidates: 8 # 最多送入辅助模型校验的候选数
  api: # 章节裁剪辅助模型配置；仅供 rerank/verify 阶段选择候选 ID，不直接生成摘录文本
    model: "gpt-5.4-mini" # 章节裁剪辅助模型名称
    temperature: 0.2 # 章节裁剪辅助模型温度
    max_tokens: 1200 # 章节裁剪辅助模型最大 token 数
    timeout_seconds: 60 # 章节裁剪辅助模型超时秒数
    max_retries: 2 # 章节裁剪辅助模型最大重试次数

generation_trace: # 章节生成 trace 日志配置
  enabled: true # 是否启用 trace 产物落盘
  directory: "./log/generation_traces" # trace 输出目录
  mode: "full" # trace 模式；full 表示记录更完整的上下文与 prompt 信息
  write_prompt: true # 是否落盘 system/user prompt 原文
  write_output: true # 是否落盘模型最终生成正文
  write_context: true # 是否落盘上下文拼接与裁剪详情
  write_summary: true # 是否落盘摘要文件 07_summary.md
  redact_sensitive: true # 是否对 trace 中的敏感信息做脱敏处理

bid_requirements: | # 采购需求原文，当前这里填写的是文件路径文本，程序会按路径读取文件内容
  "/Users/zhangqijin/Documents/Field/项目数据库/2026/投标项目/2025 年度社会公众对公共文化服务的满意度调查项目/采购需求.md"

scoring_criteria: | # 评分标准原文，当前这里填写的是文件路径文本，程序会按路径读取文件内容
  "/Users/zhangqijin/Documents/Field/项目数据库/2026/投标项目/2025 年度社会公众对公共文化服务的满意度调查项目/评分标准.md"

outline_file: | # 标书 Markdown 大纲文件路径，程序会读取完整大纲用于章节定位
  "/Users/zhangqijin/Documents/Field/项目数据库/2026/投标项目/2025 年度社会公众对公共文化服务的满意度调查项目/投标大纲.md"

output: # 输出文件配置
  directory: "/Users/zhangqijin/Documents/Field/项目数据库/2026/投标项目/2025 年度社会公众对公共文化服务的满意度调查项目/output" # 生成结果与调试文件输出目录
  prefix: "" # 输出文件名前缀；为空表示不额外加前缀
  normalize_soft_line_breaks_on_merge: true # 合并标书时是否归一化正文中的软回车
