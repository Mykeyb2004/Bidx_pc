project:
  root_dir: /Users/zhangqijin/Documents/Field/项目数据库/2026/投标项目/2025 年度社会公众对公共文化服务的满意度调查项目
  bidder_name: 杭州菲尔德咨询
  inputs:
    outline_file: ./投标大纲.md
    bid_requirements_file: ./采购需求.md
    scoring_criteria_file: ./评分标准.md
    knowledge_files: []
    knowledge_directory: ./knowledge
  output_dir: ./output
writing:
  target_words:
    default: 1500
    min: 100
    max: 12000
    step: 100
    upper_ratio: 1.15
  output_format: 纯正文
  first_line_template: ''
  max_tables_per_section: 2
  max_mermaid_flowcharts_per_section: 1
  extra_rules:
  - 根据以上任务卡，结合采购需求、评分标准撰写投标正文；
  - 内容要求专业、严谨，满足对评分标准高响应、高得分的要求；
  - 章节篇幅优先控制在目标区间内，不为凑篇幅重复展开。
  role_file: ./roles/公共服务满意度_role.md
processing:
  path: auto
  project_background:
    enabled: true
    scope: h2_auto
    max_chars: 800
    h2:
      precompute_on_batch: true
      generate_missing_on_single: true
      max_evidence_blocks: 6
      max_evidence_chars: 2400
      include_evidence_in_prompt: false
      min_evidence_blocks: 2
      fallback: global
      cache_dir: ./caches/project_background_h2
  knowledge:
    enabled: true
    max_chars: 800
  chapter_facts:
    enabled: true
    auto_extract_on_batch: true
    max_facts_per_chapter: 15
  full_context:
    chapter_writing_plan:
      enabled: false
      max_chars: 320
  hybrid_extract:
    unavailable_policy: fail_fast
    scoring_parse_mode: auto
    scoring_max_rows: 20
    quote_only: true
    return_ids_only: true
    verify_max_candidates: 8
runtime:
  stream:
    enabled: true
    idle_timeout_seconds: 12
  trace:
    enabled: true
    directory: ./log/generation_traces
    mode: full
    write_prompt: true
    write_output: true
    write_context: true
    write_summary: true
    redact_sensitive: true
  debug:
    context_pruning_dump: true
  output:
    prefix: ''
    include_title_header: true
    overwrite_existing: true
    filename_max_length: 100
    empty_filename_fallback: 未命名
  merge:
    normalize_soft_line_breaks: true
