# 自动标书撰写系统配置文件
# 用途：公共服务满意度项目的 hybrid_extract 测试版
# 处理路径：hybrid_extract（仅 lexical，不依赖 embedding / verifier 环境变量）

project:
  bidder_name: "杭州菲尔德咨询"
  root_dir: "/Users/zhangqijin/Documents/Field/项目数据库/2026/投标项目/2025 年度社会公众对公共文化服务的满意度调查项目"
  inputs:
    outline_file: "./投标大纲.md"
    bid_requirements_file: "./采购需求.md"
    scoring_criteria_file: "./评分标准.md"
  output_dir: "./output"

writing:
  role_file: "./docs/roles/公共服务满意度_role.md"
  min_words:
    default: 1500
    min: 100
    max: 12000
    step: 100
  output_format: "纯正文"
  first_line_template: ""
  allow_markdown_headings: false
  allow_english_terms: false
  max_tables_per_section: 2
  summary_title: ""
  hard_constraints:
    - "章节结构如需分层展开，必须使用正式层级序号，第一层级到第四层级分别为：一、（一）1. （1）。"
    - "如果层级序号后面带标题文字，则该行只写“序号 + 标题”，下一行另起正文。"
    - "正文中的段内枚举或并列说明，不视为章节层级，可使用“第一……、第二……”或“一是……；二是……；三是……”。"
    - "正文中不得使用“首先、其次、再次、最后”组织内容。"
    - "严禁使用Markdown标题符号（#）。"
    - "严禁正文中出现类似“作为xx投标专家”之类的内容。严禁在正文中输出评论性、意图解释性的内容。"
    - "禁止输出AI腔调，如“在当今数字化转型的大背景下...”“我们将秉承...的理念”等套话。"
    - "禁止过度使用排比句、空洞的形容词、夸张的词语。"
    - "禁止段落结构千篇一律，不要机械套用总-分-总。"
    - "禁止中英文混杂、不必要的专业术语堆砌、不必要的术语英文解释。"
    - "禁止输出分割线。"
  extra_rules:
    - "内容要专业、严谨，符合标书撰写规范，满足对评分标准高响应、高得分的要求"

processing:
  path: "hybrid_extract"
  context_view:
    include_ancestors: true
    include_siblings: true
    max_siblings: 8
  legacy_rule:
    scoring_max_rows: 4
    requirements_max_quotes: 4
    requirements_max_quote_chars: 220
    requirement_brief_enabled: true
  hybrid_extract:
    unavailable_policy: "fail_fast"
    scoring_parse_mode: "auto"
    scoring_max_rows: 4
    requirements_max_quotes: 4
    requirements_max_quote_chars: 220
    requirement_brief_enabled: true
    retrieval:
      lexical_enabled: true
      vector_enabled: false
      verify_enabled: false
      top_k_lexical: 20
      top_k_vector: 20
      top_k_fused: 30
      top_k_final: 6
      min_fused_score: 0.0
    quote_only: true
    return_ids_only: true
    verify_max_candidates: 8

models:
  pruning:
    model: "gpt-5.4-mini"
    temperature: 0.2
    max_tokens: 1200
    timeout_seconds: 60
    max_retries: 2
  embedding:
    model: "text-embedding-3-small"
    batch_size: 64
    cache_dir: "./output/_embedding_cache"
    rebuild_on_source_change: true
    query_prefix: ""
    document_prefix: ""

runtime:
  stream:
    enabled: true
    idle_timeout_seconds: 12
  trace:
    enabled: true
    directory: "./log/generation_traces"
    mode: "full"
    write_prompt: true
    write_output: true
    write_context: true
    write_summary: true
    redact_sensitive: true
  debug:
    context_pruning_dump: true
  output:
    prefix: ""
  merge:
    normalize_soft_line_breaks: true
