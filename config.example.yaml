project:
  root_dir: "."
  bidder_name: "示例投标主体名称"
  inputs:
    outline_file: "./outline.md"
    bid_requirements_file: "./项目要求/项目采购需求.md"
    scoring_criteria_file: "./项目要求/评分标准.md"
  output_dir: "./output"

writing:
  role_file: "./roles/通用投标角色.md"
  target_words:
    default: 1500
    min: 100
    max: 12000
    step: 100
    upper_ratio: 1.15
  output_format: "纯正文"
  first_line_template: ""
  allow_markdown_headings: false
  allow_english_terms: false
  max_tables_per_section: 2
  max_mermaid_flowcharts_per_section: 1
  summary_title: ""
  extra_rules: []

processing:
  path: "auto"
  project_background:
    enabled: true
    scope: "h2_auto"
    max_chars: 800
    h2:
      precompute_on_batch: true
      generate_missing_on_single: true
      max_evidence_blocks: 6
      max_evidence_chars: 2400
      include_evidence_in_prompt: false
      min_evidence_blocks: 2
      fallback: "global"
      cache_dir: "./caches/project_background_h2"
  chapter_facts:
    enabled: true
    auto_extract_on_batch: true
    max_facts_per_chapter: 15
  full_context:
    chapter_writing_plan:
      enabled: false
      max_chars: 320
  legacy_rule:
    scoring_max_rows: 4
    requirements_max_quotes: 4
    requirements_max_quote_chars: 220
    requirement_brief_enabled: true
  hybrid_extract:
    unavailable_policy: "fail_fast"
    scoring_parse_mode: "auto"
    scoring_max_rows: 20
    requirements_max_quotes: 4
    requirements_max_quote_chars: 220
    requirement_brief_enabled: true
    quote_only: true
    return_ids_only: true
    verify_max_candidates: 8

fact_cards:
  enabled: true
  cards: []
  chapter_defaults:
    # "一级标题 > 二级标题 > 三级标题":
    #   should_reference: true
    #   selections:
    #     - card_id: fact-card-1

runtime:
  stream:
    enabled: true
    idle_timeout_seconds: 12
  trace:
    enabled: true
    directory: "./log/generation_traces"
    mode: "full"
    write_prompt: true
    write_output: true
    write_context: true
    write_summary: true
    redact_sensitive: true
  debug:
    context_pruning_dump: true
  output:
    prefix: ""
    include_title_header: true
    overwrite_existing: true
    filename_max_length: 100
    empty_filename_fallback: "未命名"
  merge:
    normalize_soft_line_breaks: true
