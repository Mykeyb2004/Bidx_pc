project:
  root_dir: "/path/to/bid-project"
  bidder_name: "示例投标主体名称"
  inputs:
    outline_file: "./outline.md"
    bid_requirements_file: "./项目要求/项目采购需求.md"
    scoring_criteria_file: "./项目要求/评分标准.md"
  output_dir: "./output"

writing:
  role: |
    你是一位专业的标书撰写专家。
  min_words:
    default: 3000
    min: 100
    max: 15000
    step: 100
  output_format: "纯正文"
  first_line_template: ""
  allow_markdown_headings: false
  allow_english_terms: false
  max_tables_per_section: 2
  summary_title: ""
  hard_constraints:
    - "严禁使用Markdown标题符号（#）。"
  extra_rules:
    - "内容要专业、严谨，符合标书撰写规范"

processing:
  path: "legacy_rule"  # 可改为 "full_context"：直接把采购需求与评分标准全文送入提示词
  context_view:
    include_ancestors: true
    include_siblings: true
    max_siblings: 8
  legacy_rule:
    scoring_max_rows: 4
    requirements_max_quotes: 4
    requirements_max_quote_chars: 220
    requirement_brief_enabled: true
  hybrid_extract:
    unavailable_policy: "fallback_legacy"
    scoring_parse_mode: "auto"
    scoring_max_rows: 4
    requirements_max_quotes: 4
    requirements_max_quote_chars: 220
    requirement_brief_enabled: true
    retrieval:
      lexical_enabled: true
      vector_enabled: false
      verify_enabled: false
      top_k_lexical: 20
      top_k_vector: 20
      top_k_fused: 30
      top_k_final: 6
      min_fused_score: 0.0
    quote_only: true
    return_ids_only: true
    verify_max_candidates: 8

models:
  generation:
    model: "gpt-4o-mini"
    temperature: 0.7
    max_tokens: 8000
    timeout_seconds: 120
    max_retries: 3
  pruning:
    model: "gpt-4o-mini"
    temperature: 0.2
    max_tokens: 1200
    timeout_seconds: 60
    max_retries: 2
  embedding:
    model: "text-embedding-3-small"
    batch_size: 64
    cache_dir: "./output/_embedding_cache"
    rebuild_on_source_change: true
    query_prefix: ""
    document_prefix: ""

runtime:
  stream:
    enabled: true
    idle_timeout_seconds: 12
  trace:
    enabled: false
    directory: "./log/generation_traces"
    mode: "full"
    write_prompt: true
    write_output: true
    write_context: true
    write_summary: true
    redact_sensitive: true
  debug:
    context_pruning_dump: false
  output:
    prefix: ""
    include_title_header: true
    overwrite_existing: true
    filename_max_length: 100
    empty_filename_fallback: "untitled"
  merge:
    normalize_soft_line_breaks: false
