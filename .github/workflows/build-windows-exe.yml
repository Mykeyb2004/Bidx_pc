name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          uv run --with pyinstaller pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name bid-writer `
            --collect-all ttkbootstrap `
            run.py

      - name: Prepare artifact bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          New-Item -ItemType Directory -Force -Path artifact/roles | Out-Null
          New-Item -ItemType Directory -Force -Path artifact/项目要求 | Out-Null
          New-Item -ItemType Directory -Force -Path artifact/output | Out-Null
          New-Item -ItemType Directory -Force -Path artifact/log | Out-Null
          New-Item -ItemType Directory -Force -Path artifact/caches | Out-Null

          Copy-Item dist/bid-writer.exe artifact/
          Copy-Item config.example.yaml artifact/
          Copy-Item config.example.yaml artifact/config.yaml
          Copy-Item outline.md artifact/
          Copy-Item roles/system_gate_rules.md artifact/roles/
          Copy-Item roles/通用投标角色.md artifact/roles/
          Copy-Item roles/example_role.md artifact/roles/
          Copy-Item 项目要求/项目采购需求.md artifact/项目要求/
          Copy-Item 项目要求/评分标准.md artifact/项目要求/
          if (Test-Path .env.example) {
            Copy-Item .env.example artifact/
          }
          if (Test-Path README.md) {
            Copy-Item README.md artifact/
          }
          if (Test-Path 软件说明书.md) {
            Copy-Item 软件说明书.md artifact/
          }
          if (Test-Path 启动命令.txt) {
            Copy-Item 启动命令.txt artifact/
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: bid-writer-windows-exe
          path: artifact/
          if-no-files-found: error

      - name: Create release package
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive `
            -Path artifact/* `
            -DestinationPath release/bid-writer-${{ github.ref_name }}-windows.zip `
            -Force

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/bid-writer-${{ github.ref_name }}-windows.zip
