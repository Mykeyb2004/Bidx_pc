# 评分标准（在此填写或指定文件路径）
scoring_criteria: |
  "/Users/zhangqijin/PycharmProjects/BidX_simple/项目要求/评分标准.md"

# 标书大纲文件路径
outline_file:  |
  "./投标大纲.md"

# 输出配置
output:
  directory: "./output"
  prefix: ""
