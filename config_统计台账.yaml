project:
  root_dir: /Users/zhangqijin/Documents/Field/项目数据库/2026/投标项目/2026年浙江省文化广电和旅游统计名录库维护、基层报表审核及数据处理项目
  bidder_name: 杭州菲尔德咨询
  inputs:
    outline_file: 投标大纲 v02.md
    bid_requirements_file: 采购需求.md
    scoring_criteria_file: 评分标准.md
    knowledge_files: []
    knowledge_directory: ./knowledge
  output_dir: ./output
writing:
  target_words:
    default: 1500
    min: 100
    max: 12000
    step: 100
    upper_ratio: 1.15
  output_format: 纯正文
  first_line_template: ''
  allow_markdown_headings: false
  allow_english_terms: false
  max_tables_per_section: 2
  max_mermaid_flowcharts_per_section: 1
  summary_title: ''
  extra_rules:
  role_file: ./roles/通用投标角色.md
processing:
  path: full_context
  context_view:
    include_ancestors: true
    include_siblings: true
    max_siblings: 8
  project_background:
    enabled: false
    max_chars: 800
  auto:
    requirements_top_k: 8
  full_context:
    chapter_writing_plan:
      enabled: false
      max_chars: 320
  hybrid_extract:
    unavailable_policy: fail_fast
    scoring_parse_mode: auto
    scoring_max_rows: 20
    retrieval:
      lexical_enabled: true
      vector_enabled: false
      verify_enabled: false
      top_k_lexical: 20
      top_k_vector: 20
      top_k_fused: 30
      top_k_final: 8
      min_fused_score: 0.0
    quote_only: true
    return_ids_only: true
    verify_max_candidates: 8
  knowledge:
    enabled: true
    max_chars: 800
  chapter_facts:
    enabled: true
    auto_extract_on_batch: true
    max_facts_per_chapter: 15
models:
  generation:
    model: Qwen3.6-35B-A3B-4bit
    temperature: 0.7
    max_tokens: 10000
    timeout_seconds: 120
    max_retries: 3
  pruning:
    model: Qwen3.6-35B-A3B-4bit
    temperature: 0.2
    max_tokens: 1200
    timeout_seconds: 60
    max_retries: 2
  embedding:
    model: text-embedding-3-large
    batch_size: 64
    cache_dir: ./output/_embedding_cache
    rebuild_on_source_change: true
    query_prefix: ''
    document_prefix: ''
runtime:
  stream:
    enabled: true
    idle_timeout_seconds: 12
  trace:
    enabled: true
    directory: ./log/generation_traces
    mode: full
    write_prompt: true
    write_output: true
    write_context: true
    write_summary: true
    redact_sensitive: true
  debug:
    context_pruning_dump: true
  output:
    prefix: ''
    include_title_header: true
    overwrite_existing: true
    filename_max_length: 100
    empty_filename_fallback: 未命名
  merge:
    normalize_soft_line_breaks: true
