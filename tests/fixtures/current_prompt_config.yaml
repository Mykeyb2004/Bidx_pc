project:
  bidder_name: "测试投标主体"
  inputs:
    outline_file: "./outline.md"
    bid_requirements_file: "./bid_requirements.md"
    scoring_criteria_file: "./scoring_criteria.md"
    knowledge_files:
      - "./knowledge_company.md"
  output_dir: "./output"

writing:
  role_file: "./roles/example_role.md"
  hard_constraints:
    - "旧字段不应再进入 system prompt"
  extra_rules:
    - "内容要专业、严谨，符合标书撰写规范。"
    - "请根据以上任务卡，结合采购需求、评分标准撰写投标正文。"
  target_words:
    default: 1200
    upper_ratio: 1.15
  output_format: "纯正文"
  first_line_template: ""
  max_tables_per_section: 2
  max_mermaid_flowcharts_per_section: 0

processing:
  path: "full_context"
  knowledge:
    enabled: true
    max_chars: 400
  legacy_rule:
    scoring_max_rows: 4
    requirement_brief_enabled: false
  hybrid_extract:
    unavailable_policy: "fallback_legacy"
    scoring_parse_mode: "auto"
    scoring_max_rows: 4
    requirements_max_quotes: 4
    requirements_max_quote_chars: 220
    requirement_brief_enabled: false
    quote_only: true
    return_ids_only: true
    verify_max_candidates: 8

runtime:
  stream:
    enabled: false
  trace:
    enabled: true
    directory: "./trace-output"
    mode: "full"
    write_prompt: true
    write_output: true
    write_context: true
    write_summary: true
    redact_sensitive: true
